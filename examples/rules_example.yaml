parametros:
  - name: Relacion_NP
    condition:
      type: conditional
      if:
        operator: AND
        conditions:
          - type: greater_than
            col: nitrógeno
            value: 5
          - operator: OR
            conditions:
              - type: less_than
                col: fósforo
                value: 3
              - type: between
                col: fósforo
                min: 4
                max: 6
      then:
        type: less_than
        col: valor
        value: 2
_global:
  - type: between
    col: temperatura
    min: 0
    max: 35
