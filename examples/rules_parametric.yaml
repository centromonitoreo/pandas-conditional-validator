validations:
  - name: Relacion_NP
    condition:
      type: conditional
      if:
        type: composite
        operator: AND
        conditions:
          - type: greater_than
            col: "{nitrogen_column}"
            value: "{nitrogen_threshold}"
          - type: composite
            operator: OR
            conditions:
              - type: less_than
                col: "{phosphorus_column}"
                value: "{phosphorus_low}"
              - type: between
                col: "{phosphorus_column}"
                min: "{phosphorus_mid_min}"
                max: "{phosphorus_mid_max}"
      then:
        type: less_than
        col: "{target_column}"  # Parámetro para columna objetivo
        value: "{target_threshold}"

  - name: Temperatura_Rango
    condition:
      type: between
      col: "{temperature_column}"
      min: "{temp_min}"
      max: "{temp_max}"  # Parámetro para temperatura máxima

  - name: Nivel_Caudal
    condition:
      type: conditional
      if:
        type: composite
        operator: AND
        conditions:
          - type: greater_than
            col: "{flow_column}"
            value: "{flow_threshold}"
      then:
        type: less_than
        col: "{target_column}"
        value: "{target_threshold}"  


