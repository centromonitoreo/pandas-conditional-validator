# Configuración completa de reglas con metadata para documentación y logging
metadata:
  version: "1.0"
  description: "Reglas de validación completas para análisis de calidad de datos"
  author: "Equipo de Validación"
  created: "2025-01-01"
  last_modified: "2025-08-04"

parametros:
  # Regla para validar relación Nitrógeno-Fósforo
  Relacion_NP:
    metadata:
      name: "Validación Relación Nitrógeno-Fósforo"
      description: "Valida que cuando hay altos niveles de N y P en ciertos rangos, el valor objetivo sea bajo"
      category: "nutrientes"
      severity: "warning"
      business_rule: "BR001"
      documentation_url: "https://docs.empresa.com/validaciones/nutrientes"
      tags: ["nutrientes", "agricultura", "calidad"]
    condition:
      type: conditional
      metadata:
        name: "Condición IF-THEN para Nutrientes"
        description: "Si N > umbral Y (P < bajo O P en rango medio), entonces valor < umbral objetivo"
      if:
        operator: AND
        metadata:
          name: "Condiciones de Nutrientes Combinadas"
          description: "Nitrógeno alto Y condiciones específicas de fósforo"
        conditions:
          - type: greater_than
            col: "{nitrogen_column}"
            value: "{nitrogen_threshold}"
            metadata:
              name: "Nitrógeno Alto"
              description: "Verificar que el nitrógeno supere el umbral establecido"
              unit: "mg/L"
              expected_range: "0-50"
          - operator: OR
            metadata:
              name: "Condiciones Alternativas de Fósforo"
              description: "Fósforo bajo O en rango medio específico"
            conditions:
              - type: less_than
                col: "{phosphorus_column}"
                value: "{phosphorus_low}"
                metadata:
                  name: "Fósforo Bajo"
                  description: "Fósforo por debajo del umbral mínimo"
                  unit: "mg/L"
                  impact: "Puede indicar deficiencia nutricional"
              - type: between
                col: "{phosphorus_column}"
                min: "{phosphorus_mid_min}"
                max: "{phosphorus_mid_max}"
                metadata:
                  name: "Fósforo Rango Medio"
                  description: "Fósforo en rango intermedio específico"
                  unit: "mg/L"
                  impact: "Rango de transición crítico"
      then:
        type: less_than
        col: "{target_column}"
        value: "{target_threshold}"
        metadata:
          name: "Valor Objetivo Bajo"
          description: "El valor objetivo debe mantenerse bajo cuando se cumplen las condiciones"
          unit: "unidades específicas"
          action: "Alertar si el valor es demasiado alto"

  # Regla para validar rango de temperatura
  Temperatura_Rango:
    metadata:
      name: "Validación Rango de Temperatura"
      description: "Verifica que la temperatura esté dentro del rango operativo aceptable"
      category: "ambiente"
      severity: "error"
      business_rule: "BR002"
      documentation_url: "https://docs.empresa.com/validaciones/temperatura"
      tags: ["temperatura", "ambiente", "operativo"]
    condition:
      type: between
      col: "{temperature_column}"
      min: "{temp_min}"
      max: "{temp_max}"
      metadata:
        name: "Rango Operativo de Temperatura"
        description: "La temperatura debe estar entre los límites operativos establecidos"
        unit: "°C"
        expected_range: "15-35"
        impact: "Temperaturas fuera de rango pueden afectar la calidad del proceso"
        action: "Detener proceso si está fuera de rango"

  # Regla para validar pH
  pH_Optimo:
    metadata:
      name: "Validación pH Óptimo"
      description: "Verifica que el pH esté en el rango óptimo para el proceso"
      category: "quimica"
      severity: "warning"
      business_rule: "BR003"
      documentation_url: "https://docs.empresa.com/validaciones/ph"
      tags: ["ph", "quimica", "proceso"]
    condition:
      type: between
      col: "{ph_column}"
      min: "{ph_min}"
      max: "{ph_max}"
      metadata:
        name: "Rango Óptimo de pH"
        description: "pH debe estar en rango óptimo para máxima eficiencia"
        unit: "unidades de pH"
        expected_range: "6.5-8.5"
        impact: "pH fuera de rango reduce eficiencia del proceso"
        action: "Ajustar químicos para corregir pH"

  # Regla compleja con múltiples condiciones
  Calidad_Integral:
    metadata:
      name: "Validación Integral de Calidad"
      description: "Evaluación completa considerando múltiples parámetros de calidad"
      category: "calidad_integral"
      severity: "critical"
      business_rule: "BR004"
      documentation_url: "https://docs.empresa.com/validaciones/integral"
      tags: ["calidad", "integral", "multivariable"]
    condition:
      type: conditional
      metadata:
        name: "Evaluación Integral IF-THEN"
        description: "Si las condiciones ambientales son óptimas, entonces la calidad debe ser alta"
      if:
        operator: AND
        metadata:
          name: "Condiciones Ambientales Óptimas"
          description: "Todas las condiciones ambientales dentro de parámetros"
        conditions:
          - type: between
            col: "{temperature_column}"
            min: "{optimal_temp_min}"
            max: "{optimal_temp_max}"
            metadata:
              name: "Temperatura Óptima"
              description: "Temperatura en rango óptimo de operación"
              unit: "°C"
          - type: between
            col: "{humidity_column}"
            min: "{humidity_min}"
            max: "{humidity_max}"
            metadata:
              name: "Humedad Controlada"
              description: "Humedad relativa en rango controlado"
              unit: "%"
          - type: expression
            expr: "{pressure_column} > {pressure_threshold} AND {flow_column} > {flow_min}"
            metadata:
              name: "Condiciones de Presión y Flujo"
              description: "Presión adecuada y flujo mínimo garantizado"
              unit: "bar / L/min"
      then:
        operator: AND
        metadata:
          name: "Indicadores de Calidad Alta"
          description: "Todos los indicadores de calidad deben estar en niveles altos"
        conditions:
          - type: greater_than
            col: "{quality_score_column}"
            value: "{quality_min_score}"
            metadata:
              name: "Puntuación de Calidad Mínima"
              description: "Puntuación de calidad debe superar el mínimo establecido"
              unit: "puntos"
          - type: less_than
            col: "{defect_rate_column}"
            value: "{max_defect_rate}"
            metadata:
              name: "Tasa de Defectos Baja"
              description: "Tasa de defectos debe mantenerse por debajo del máximo"
              unit: "%"

  # Regla de expresión personalizada
  Formula_Personalizada:
    metadata:
      name: "Fórmula de Validación Personalizada"
      description: "Validación usando fórmula matemática específica del negocio"
      category: "formulas"
      severity: "warning"
      business_rule: "BR005"
      documentation_url: "https://docs.empresa.com/validaciones/formulas"
      tags: ["formula", "matematica", "personalizada"]
    condition:
      type: expression
      expr: "({efficiency_column} * {yield_column}) / {input_column} > {efficiency_threshold}"
      metadata:
        name: "Índice de Eficiencia"
        description: "Cálculo de eficiencia basado en rendimiento y entrada"
        formula: "(eficiencia * rendimiento) / entrada > umbral"
        unit: "ratio"
        impact: "Indica la eficiencia operativa del proceso"
        action: "Optimizar parámetros si eficiencia es baja"

# Reglas globales que aplican a todos los registros
_global:
  - type: greater_than
    col: "{record_id_column}"
    value: 0
    metadata:
      name: "ID de Registro Válido"
      description: "Todo registro debe tener un ID válido mayor a 0"
      category: "integridad"
      severity: "error"
      business_rule: "BR006"
      tags: ["integridad", "id", "basico"]
      action: "Rechazar registros con ID inválido"

  - type: expression
    expr: "{timestamp_column} IS NOT NULL AND {timestamp_column} != ''"
    metadata:
      name: "Timestamp Requerido"
      description: "Todo registro debe tener un timestamp válido"
      category: "integridad"
      severity: "error" 
      business_rule: "BR007"
      tags: ["timestamp", "integridad", "temporal"]
      action: "Rechazar registros sin timestamp"

  - type: less_than
    col: "{data_age_days}"
    value: "{max_data_age}"
    metadata:
      name: "Datos Recientes"
      description: "Los datos no deben ser demasiado antiguos"
      category: "frescura"
      severity: "warning"
      business_rule: "BR008"
      tags: ["frescura", "temporal", "calidad"]
      unit: "días"
      action: "Marcar datos antiguos para revisión"

  - type: between
    col: "{confidence_score}"
    min: "{min_confidence}"
    max: 1.0
    metadata:
      name: "Puntuación de Confianza"
      description: "La confianza en los datos debe estar en rango aceptable"
      category: "confianza"
      severity: "info"
      business_rule: "BR009"
      tags: ["confianza", "calidad", "estadistica"]
      unit: "probabilidad (0-1)"
      action: "Revisar datos con baja confianza"

# Configuración de logging y documentación
logging_config:
  level: "INFO"
  include_metadata: true
  log_format: "json"
  fields_to_log:
    - "rule_name"
    - "validation_name" 
    - "description"
    - "category"
    - "severity"
    - "business_rule"
    - "tags"
    - "result"
    - "affected_rows"
    - "execution_time"
  
documentation_config:
  auto_generate: true
  output_format: ["markdown", "html"]
  include_examples: true
  group_by_category: true
  include_business_rules: true
